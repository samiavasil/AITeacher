<!doctype html>
<html lang="bg">

<head>
  <meta charset="UTF-8" />
  <title>Семантична страница</title>
</head>

<body>
  <!-- Добави семантична структура тук -->
  <header>
    <h1>Семантичен лейаут</h1>
  </header>
  <nav>
    <ul>
      <li><a href="https://ic.pics.livejournal.com/humus/758313/69309891/69309891_original.jpg">Начало</a></li>
      <li><a href="https://ic.pics.livejournal.com/humus/758313/69309565/69309565_original.jpg">За нас</a></li>
      <li><a href="https://ic.pics.livejournal.com/humus/758313/69309362/69309362_original.jpg">Контакти</a></li>
    </ul>
  </nav>

  <main>
    <article>
      <h2>Статия 1</h2>
      <p>Това е първата статия.</p>
      <div>
        <img width="300" src="https://ic.pics.livejournal.com/humus/758313/69309362/69309362_original.jpg"
          alt="Чички" />
        <p>Чички</p>
      </div>
    </article>
    <article>
      <h2>Статия 2</h2>
      <p>Това е втората статия.</p>
      <form>
        <label for="name">Име:</label>
        <input type="text" id="name" name="name" />
        <br />
        <label for="email">Имейл:</label>
        <input type="email" id="email" name="email" />
        <br />
        <button type="submit"  aria-label="Изпрати">Изпрати</button>
      </form>
    </article>
  </main>
  <aside>
    <h2>Странично съдържание</h2>
    <p>Това е страничното съдържание.</p>
  </aside>
  <footer>
    <p>Авторско право © 2024</p>
  </footer>
</body>

</html>
