<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <title>Регистрация</title>
  </head>
  <body>
    <!-- Добави твой HTML форма тук -->
     <form action="/submit" method="post">
     <fieldset>
        <legend>Лични данни</legend>

        <label for="name">Име:</label>
        <input type="text" id="name" name="name" minlength="3" required />
        <label for="email">Имейл:</label>
        <input type="email" id="email" name="email" required />
        
        <label for="gender">Пол:</label>
        <input type="radio" id="man" name="gender" />
        <label for="man">Мъж</label>
        <input type="radio" id="woman" name="gender" />
        <label for="woman">Жена</label>
        <label for="saglasie">Съгласие:</label>
        <select id="country"    name="country">
          <option value="bg">България</option>
          <option value="us">САЩ</option>
          <option value="de">Германия</option>
        </select>
        <input type="checkbox" id="saglasie" name="saglasie" />
        <label for="text">Бележка:</label>
        <textarea id="text" name="text"></textarea>
        <button type="submit">Регистрирай се</button>
        <button type="reset">Изчисти</button>
     </fieldset>
    </form>
  </body>
</html>
